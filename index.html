<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Central Library</title>

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- External CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
<div class="container-fluid">

<a class="navbar-brand fw-bold" href="#">
<i class="bi bi-book-half"></i> Library
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#manage">Manage</a></li>
</ul>
</div>

</div>
</nav>

<!-- HEADER -->
<header class="text-center text-white py-4">
<h1>📚 City Central Library</h1>
<p class="lead">Bootstrap Based Library System</p>
</header>

<div class="container py-4">

<h2 class="text-center text-white mb-4">📖 Manage Your Library</h2>

<!-- FORM -->
<div class="card shadow-lg mb-4" id="manage">
<div class="card-body">

<div class="row g-3">

<div class="col-md-4">
<input type="text" id="title" class="form-control" placeholder="Book Title">
</div>

<div class="col-md-4">
<input type="text" id="author" class="form-control" placeholder="Author Name">
</div>

<div class="col-md-4">
<input type="text" id="isbn" class="form-control" placeholder="ISBN">
</div>

<div class="col-md-4">
<input type="text" id="link" class="form-control" placeholder="Book Link">
</div>

<div class="col-md-4">
<input type="text" id="image" class="form-control" placeholder="Image URL">
</div>

<div class="col-md-4">
<select id="status" class="form-select">
<option>Available</option>
<option>Not Available</option>
</select>
</div>

<div class="col-12">
<button onclick="addBook()" class="btn btn-warning w-100">
<i class="bi bi-plus-circle"></i> Add Book
</button>
</div>

</div>

</div>
</div>

<!-- SEARCH -->
<div class="row mb-4">
<div class="col-md-6 mx-auto">
<input type="text" id="search" class="form-control form-control-lg"
placeholder="🔍 Search books..." onkeyup="searchBook()">
</div>
</div>

<!-- TABLE -->
<div class="table-responsive">
<table class="table table-bordered table-hover bg-white shadow" id="table">

<thead class="table-dark">
<tr>
<th>Cover</th>
<th>Title</th>
<th>Author</th>
<th>ISBN</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-3 mt-4">
<p>© 2026 City Central Library</p>
</footer>

<!-- JS -->
<script>
// SAME JS (unchanged)
let defaultBooks = [
{title:"The Alchemist",author:"Paulo Coelho",isbn:"1001",link:"https://en.wikipedia.org/wiki/The_Alchemist_(novel)",image:"https://covers.openlibrary.org/b/id/8231856-L.jpg",status:"Available"},
{title:"Atomic Habits",author:"James Clear",isbn:"1002",link:"https://en.wikipedia.org/wiki/Atomic_Habits",image:"https://covers.openlibrary.org/b/id/10594765-L.jpg",status:"Available"}
];

let books = JSON.parse(localStorage.getItem("books")) || defaultBooks;

function displayBooks(){
let tbody = document.querySelector("#table tbody");
tbody.innerHTML="";

books.forEach((book,index)=>{
tbody.innerHTML += `
<tr>
<td><img src="${book.image}" class="book-img"></td>
<td><a href="${book.link}" target="_blank">${book.title}</a></td>
<td><a href="${book.link}" target="_blank">${book.author}</a></td>
<td>${book.isbn}</td>
<td class="${book.status=='Available'?'text-success fw-bold':'text-danger fw-bold'}">${book.status}</td>
<td>
<button class="btn btn-danger btn-sm" onclick="deleteBook(${index})">Delete</button>
</td>
</tr>`;
});
}

function addBook(){
let book = {
title:title.value,
author:author.value,
isbn:isbn.value,
link:link.value,
image:image.value,
status:status.value
};

books.push(book);
localStorage.setItem("books",JSON.stringify(books));
displayBooks();
}

function deleteBook(index){
books.splice(index,1);
localStorage.setItem("books",JSON.stringify(books));
displayBooks();
}

function searchBook(){
let input = search.value.toLowerCase();

document.querySelectorAll("#table tbody tr").forEach(row=>{
row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
});
}

displayBooks();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
